# Deploy the marketing site in /website to GitHub Pages (GitHub Actions source).
#
# ONE-TIME SETUP (required or configure-pages fails with "Get Pages site failed"):
# 1. Repo → Settings → Pages
# 2. Under "Build and deployment" → Source: select "GitHub Actions" (NOT "Deploy from a branch")
# 3. Save, then re-run this workflow (Actions → workflow → Run workflow)
#
# Site URL: https://<owner>.github.io/<repo>/

name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
