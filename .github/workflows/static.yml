# Deploy /website using GitHub’s official Pages + Actions integration
# (artifact upload + deploy — no configure-pages, no gh-pages branch).
#
# ONE-TIME (required):
#   Repo → Settings → Pages → Build and deployment → Source: GitHub Actions → Save
# If Source is still “Deploy from a branch”, the deploy job will fail.
#
# First run may ask you to approve the `github-pages` environment (Deployments).
#
# Live URL: https://<owner>.github.io/<repo>/  (repo = repository slug on GitHub)

name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pages URL hint
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "Pages settings: https://github.com/${GITHUB_REPOSITORY}/settings/pages"
          echo "Expect live at: https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
