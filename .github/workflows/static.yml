# Publishes /website to the orphan branch `gh-pages`.
#
# Setup (no "GitHub Actions" Pages API — avoids configure-pages "Get Pages site failed"):
# 1. Push this workflow; wait until the `gh-pages` branch exists (first run creates it).
# 2. Repo → Settings → Pages
# 3. Build and deployment → Source: "Deploy from a branch"
# 4. Branch: gh-pages  /  Folder: / (root)
# 5. Save
#
# Site: https://<owner>.github.io/<repo>/

name: Deploy website to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project Pages URL uses the *repository slug* on GitHub (not the extension name).
      # If this 404s, set Settings → Pages → Source: Deploy from branch → gh-pages / (root).
      - name: Expected site URL (after Pages is configured)
        run: |
          REPO="${GITHUB_REPOSITORY#*/}"
          echo "Configure: https://github.com/${GITHUB_REPOSITORY}/settings/pages"
          echo "Live URL:  https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO}/"

      - name: Publish website/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          publish_branch: gh-pages
          force_orphan: true
